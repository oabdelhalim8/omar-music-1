model_name: exp-20230720
net_params:
  inc: 1
  num_embed: 128
  embed_dim: 256
  num_residual: 2
  beta: 0.25
  decay: 0.99

batch_size: 32
epochs: 20000

data_func:
  func: load_maestro_data
  params:
    dir_path: ../datasets/maestro-v3.0.0
    test_size: 0.3
    window_size: 1024
    stride: 768

shape: [1, 88, 1024]

vis_epoch: 1

# ── Metric-aware checkpoint retention ────────────────────────────────────────
checkpoint:
  # Keep-Top-K: retain only the N best checkpoints by validation loss.
  # The adaptive risk controller may tighten this value during high-risk phases.
  save_top_k: 5
  # Rolling-Window: always keep the last K checkpoints as a FIFO safety net.
  keep_last_k: 3
  # Weights-Only: save model weights only (~50 % smaller); set false to also
  # persist optimizer state (needed to resume training exactly).
  weights_only: true
  # Metric direction: "min" for loss (lower is better).
  mode: min

# ── CV-Checkpoint Coupling (Adaptive Threshold Mode) ─────────────────────────
divergence:
  # Absolute train-val gap above which risk starts to escalate.
  gap_threshold: 0.05
  # Fold-loss variance above which risk is immediately set to HIGH.
  high_variance_threshold: 0.02
  # Sliding window length (epochs) for gap history.
  history_window: 5
  # Number of folds used for the lightweight k-fold CV pass.
  cv_folds: 5